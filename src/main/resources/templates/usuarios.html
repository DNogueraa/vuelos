<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Usuarios</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Lista de Usuarios</h1>
    <a class="btn btn-outline-secondary" href="/">Volver</a>
  </div>

  <table class="table table-bordered">
    <thead>
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Apellido</th>
      <th>Agencia</th>
      <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="usuario : ${usuarios}">
      <td th:text="${usuario.id}"></td>
      <td th:text="${usuario.nombre}"></td>
      <td th:text="${usuario.apellido}"></td>
      <td th:text="${usuario.agencia != null ? usuario.agencia.nombre : '—'}"></td>
      <td>
        <a th:href="@{/usuarios/editar(id=${usuario.id})}" class="btn btn-warning btn-sm me-1">Editar</a>
        <a th:href="@{/usuarios/eliminar(id=${usuario.id})}" class="btn btn-danger btn-sm">Eliminar</a>
      </td>
    </tr>
    </tbody>
  </table>

  <h2 class="mt-4">Agregar Usuario</h2>
  <form action="/usuarios/guardar" method="post">
    <div class="mb-3">
      <label for="nombre" class="form-label">Nombre</label>
      <input id="nombre" name="nombre" type="text" class="form-control" required>
    </div>
    <div class="mb-3">
      <label for="apellido" class="form-label">Apellido</label>
      <input id="apellido" name="apellido" type="apellido" class="form-control" required>
    </div>
    <div class="mb-3">
      <label for="agenciaId" class="form-label">Agencia</label>
      <select id="agenciaId" name="agenciaId" class="form-control" required>
        <option value="" selected disabled>Selecciona una agencia</option>
        <option th:each="a : ${agencias}" th:value="${a.id}" th:text="${a.nombre}"></option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Guardar</button>
  </form>
</div>
</body>
</html>
