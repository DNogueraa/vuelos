<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Vuelos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Lista de Vuelos</h1>
    <a class="btn btn-outline-secondary" href="/">Volver</a>
  </div>

  <table class="table table-bordered">
    <thead>
    <tr>
      <th>ID</th>
      <th>Avion</th>
      <th>Matricula</th>
      <th>Destino</th>
      <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="vuelo : ${vuelos}">
      <td th:text="${vuelo.id}"></td>
      <td th:text="${vuelo.avion}"></td>
      <td th:text="${vuelo.matricula}"></td>
      <td th:text="${vuelo.destino}"></td>
      <td>
        <a th:href="@{/vuelos/editar(id=${vuelo.id})}" class="btn btn-warning btn-sm me-1">Editar</a>
        <a th:href="@{/vuelos/eliminar(id=${vuelo.id})}" class="btn btn-danger btn-sm">Eliminar</a>
      </td>
    </tr>
    </tbody>
  </table>

  <h2 class="mt-4">Agregar Vuelo</h2>
  <form action="/vuelos/guardar" method="post">
    <div class="mb-3">
      <label for="avion" class="form-label">Avion</label>
      <input id="avion" name="avion" type="text" class="form-control" required>
    </div>

    <div class="mb-3">
      <label for="matricula" class="form-label">Matricula</label>
      <input id="matricula" name="matricula" type="text" class="form-control" required>
    </div>

    <div class="mb-3">
      <label for="destino" class="form-label">Destino</label>
      <input id="destino" name="destino" type="text" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary">Guardar</button>
  </form>
</div>
</body>
</html>
