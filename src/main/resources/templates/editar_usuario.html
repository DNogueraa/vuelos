<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Editar Usuario</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">
  <h1>Editar Usuario</h1>

  <form th:action="@{/usuarios/actualizar}" method="post">

    <!-- ID oculto -->
    <input type="hidden" name="id" th:value="${usuario.id}"/>

    <div class="mb-3">
      <label class="form-label">Nombre</label>
      <input type="text"
             name="nombre"
             class="form-control"
             th:value="${usuario.nombre}"
             required>
    </div>

    <div class="mb-3">
      <label class="form-label">Apellido</label>
      <input type="text"
             name="apellido"
             class="form-control"
             th:value="${usuario.apellido}"
             required>
    </div>

    <div class="mb-3">
      <label class="form-label">Agencia</label>
      <select name="agenciaId" class="form-control" required>
        <option th:each="a : ${agencias}"
                th:value="${a.id}"
                th:text="${a.nombre}"
                th:selected="${usuario.agencia != null && a.id == usuario.agencia.id}">
        </option>
      </select>
    </div>

    <button type="submit" class="btn btn-success">Guardar cambios</button>
    <a href="/usuarios" class="btn btn-secondary ms-2">Cancelar</a>

  </form>
</div>

</body>
</html>
