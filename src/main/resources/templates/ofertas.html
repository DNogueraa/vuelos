<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Ofertas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Lista de Ofertas</h1>
    <a class="btn btn-outline-secondary" href="/">Volver</a>
  </div>

  <table class="table table-bordered">
    <thead>
    <tr>
      <th>ID</th>
      <th>Precio</th>
      <th>Agencia</th>
      <th>Ticket</th>
      <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="oferta : ${ofertas}">
      <td th:text="${oferta.id}"></td>
      <td th:text="${oferta.precio}"></td>
      <td th:text="${oferta.agencia != null ? oferta.agencia.nombre : '—'}"></td>
      <td th:text="${oferta.ticket != null ? oferta.ticket.id : '—'}"></td>
      <td>
        <a th:href="@{/ofertas/eliminar(id=${oferta.id})}" class="btn btn-danger btn-sm">Eliminar</a>
      </td>
    </tr>
    </tbody>
  </table>

  <h2 class="mt-4">Agregar Oferta</h2>
  <form action="/ofertas/guardar" method="post">
    <div class="mb-3">
      <label for="precio" class="form-label">Precio</label>
      <input id="precio" name="precio" type="number" step="0.01" class="form-control" required>
    </div>

    <div class="mb-3">
      <label for="agenciaId" class="form-label">Agencia</label>
      <select id="agenciaId" name="agenciaId" class="form-control" required>
        <option value="" selected disabled>Selecciona una agencia</option>
        <option th:each="a : ${agencias}" th:value="${a.id}" th:text="${a.nombre}"></option>
      </select>
    </div>

    <div class="mb-3">
      <label for="ticketId" class="form-label">Ticket</label>
      <select id="ticketId" name="ticketId" class="form-control" required>
        <option value="" selected disabled>Selecciona un ticket</option>
        <option th:each="t : ${tickets}" th:value="${t.id}"
                th:text="${'Ticket ID ' + t.id + ' - ' + t.precio}"></option>
      </select>
    </div>

    <button type="submit" class="btn btn-primary">Guardar</button>
  </form>
</div>
</body>
</html>
