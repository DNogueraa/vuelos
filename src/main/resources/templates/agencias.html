<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Agencias</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Lista de Agencias</h1>
    <a class="btn btn-outline-secondary" href="/">Volver</a>
  </div>

  <table class="table table-bordered">
    <thead>
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Email</th>
      <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="agencia : ${agencias}">
      <td th:text="${agencia.id}"></td>
      <td th:text="${agencia.nombre}"></td>
      <td th:text="${agencia.ubicacion}"></td>
      <td>
        <a th:href="@{/agencias/editar(id=${agencia.id})}" class="btn btn-warning btn-sm me-1">Editar</a>
        <a th:href="@{/agencias/eliminar(id=${agencia.id})}" class="btn btn-danger btn-sm">Eliminar</a>
      </td>
    </tr>
    </tbody>
  </table>

  <h2 class="mt-4">Agregar Agencia</h2>
  <form action="/agencias/guardar" method="post">
    <div class="mb-3">
      <label for="nombre" class="form-label">Nombre</label>
      <input id="nombre" name="nombre" type="text" class="form-control" required>
    </div>
    <div class="mb-3">
      <label for="ubicacion" class="form-label">Email</label>
      <input id="ubicacion" name="ubicacion" type="text" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Guardar</button>
  </form>
</div>
</body>
</html>
