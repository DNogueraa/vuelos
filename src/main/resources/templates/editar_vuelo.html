<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Editar Vuelo</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">
  <h1>Editar Vuelo</h1>

  <form th:action="@{/vuelos/actualizar}" method="post">

    <!-- ID oculto -->
    <input type="hidden" name="id" th:value="${vuelo.id}"/>

    <div class="mb-3">
      <label class="form-label">Avion</label>
      <input type="text"
             name="avion"
             class="form-control"
             th:value="${vuelo.avion}"
             required>
    </div>

    <div class="mb-3">
      <label class="form-label">Matricula</label>
      <input type="text"
             name="matricula"
             class="form-control"
             th:value="${vuelo.matricula}"
             required>
    </div>

    <div class="mb-3">
      <label class="form-label">Destino</label>
      <input type="text"
             name="destino"
             class="form-control"
             th:value="${vuelo.destino}"
             required>
    </div>

    <button type="submit" class="btn btn-success">Guardar cambios</button>
    <a href="/vuelos" class="btn btn-secondary ms-2">Cancelar</a>

  </form>
</div>

</body>
</html>
