<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Editar Ticket</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">
  <h1>Editar Ticket</h1>

  <form th:action="@{/tickets/actualizar}" method="post">

    <!-- ID oculto -->
    <input type="hidden" name="id" th:value="${ticket.id}"/>

    <div class="mb-3">
      <label class="form-label">Precio</label>
      <input type="number"
             name="precio"
             step="0.01"
             class="form-control"
             th:value="${ticket.precio}"
             required>
    </div>

    <div class="mb-3">
      <label class="form-label">Fecha</label>
      <!-- Para input type="date" lo normal es yyyy-MM-dd -->
      <input type="date"
             name="fecha"
             class="form-control"
             th:value="${ticket.fecha}"
             required>
    </div>

    <div class="mb-3">
      <label class="form-label">Hora</label>
      <!-- Para input type="time" lo normal es HH:mm -->
      <input type="time"
             name="hora"
             class="form-control"
             th:value="${ticket.hora}"
             required>
    </div>

    <div class="mb-3">
      <label class="form-label">Usuario</label>
      <select name="idUsuario" class="form-control" required>
        <option value="" disabled>Selecciona un usuario</option>
        <option th:each="u : ${usuarios}"
                th:value="${u.id}"
                th:text="${u.nombre}"
                th:selected="${ticket.usuario != null && u.id == ticket.usuario.id}">
        </option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Vuelo</label>
      <select name="idVuelo" class="form-control" required>
        <option value="" disabled>Selecciona un vuelo</option>
        <option th:each="v : ${vuelos}"
                th:value="${v.id}"
                th:text="${'ID ' + v.id + ' - ' + v.avion + ' → ' + v.destino}"
                th:selected="${ticket.vuelo != null && v.id == ticket.vuelo.id}">
        </option>
      </select>
    </div>

    <button type="submit" class="btn btn-success">Guardar cambios</button>
    <a href="/tickets" class="btn btn-secondary ms-2">Cancelar</a>

  </form>
</div>

</body>
</html>
